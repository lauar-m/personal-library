<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Malu's Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fafafa;
      }

      header {
        background: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        border-bottom: 1px solid #ddd;
        position: sticky;
        top: 0;
      }

      .upload {
        padding: 15px;
        text-align: center;
        background: #fff;
        border-bottom: 1px solid #eee;
      }

      .grid {
        column-count: 2;
        column-gap: 10px;
        padding: 10px;
      }

      .card {
        background: white;
        display: inline-block;
        width: 100%;
        margin: 0 0 10px;
        padding: 12px;
        box-sizing: border-box;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      .card h3 {
        font-size: 15px;
        margin: 0 0 10px;
        word-break: break-word;
      }

      .btn {
        display: inline-block;
        padding: 6px 10px;
        background: #e60023; /* pinterest-like */
        color: white;
        text-decoration: none;
        border-radius: 20px;
        font-size: 13px;
      }

      .btn:active {
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <header>Malu's Library</header>

    <div class="upload">
      <input type="file" id="fileInput" />
      <button onclick="upload()">Upload</button>
    </div>

    <div class="grid" id="grid"></div>

    <script>
      function upload() {
        var input = document.getElementById("fileInput");
        if (!input.files.length) {
          alert("Selecione um arquivo para enviar.");
          return;
        }
        var file = input.files[0];
        var formData = new FormData();
        formData.append("file", file);

        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload", true);

        xhr.onload = function () {
          if (xhr.status === 201) {
            alert("Upload realizado com sucesso!");
            window.location.reload();
          } else {
            var msg = "Erro ao enviar arquivo";
            try {
              var resp = JSON.parse(xhr.responseText);
              if (resp && resp.description) msg = resp.description;
            } catch (e) {}
            alert(msg);
          }
        };
        xhr.send(formData);
      }
    </script>

    <script>
      window.onload = function () {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "/books", true);

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status !== 200) {
              alert("Erro HTTP: " + xhr.status);
              return;
            }

            var data;
            try {
              data = JSON.parse(xhr.responseText);
            } catch (e) {
              alert("Erro ao ler resposta");
              return;
            }

            var grid = document.getElementById("grid");
            if (!grid) {
              alert("Grid não encontrado");
              return;
            }

            grid.innerHTML = "";

            var books = data.available_books;
            if (!books) {
              alert("Sem livros");
              return;
            }

            var keys = Object.keys(books);

            for (var i = 0; i < keys.length; i++) {
              var id = keys[i];
              var name = books[id];

              var div = document.createElement("div");
              div.className = "card";

              var title = document.createElement("h3");
              title.innerHTML = name;

              var link = document.createElement("a");
              link.className = "btn";
              link.href = "/download/" + id;
              link.innerHTML = "Baixar";

              div.appendChild(title);
              div.appendChild(link);
              grid.appendChild(div);
            }
          }
        };

        xhr.send();
      };
    </script>
  </body>
</html>
